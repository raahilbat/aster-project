<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form>
        <div class="section-title">
            Basic Information
        </div>
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="age">Age</label>
            <input type="text" id="age" name="age" required>
        </div>
        <div class="form-group">
            <label for="Gender">Gender</label>
            <select name="Gender" id="Gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>
        <div class="form-group">
            <label for="Height and Weight(in cm and kg)">Height and Weight</label>
            <input type="text" id="Height and Weight" name="Height and Weight" required>
        </div>
        <div class="section-title">
            Family and Medical History
        </div>
        <div class="form-group">
            <label for="Does anyone in your family have diabetes?">Does anyone in your family have diabetes?</label>
            <select name="Does anyone in your family have diabetes?" id="Does anyone in your family have diabetes?" required>
                <option value="">Select an option</option>
                <option value="Mother">Mother</option>
                <option value="Father">Father</option>
                <option value="Sibling">Sibling</option>
                <option value="Grandparent">Grandparent</option>
                <option value="None">None</option>
            </select>
        </div>
        <div class="form-group">
            <label for="Do you have any of the following conditions">Do you have any of the following conditions?</label>
            <select name="Do you have any of the following conditions?" id="Do you have any of the following conditions" required>
                <option value="">Select an option</option>
                <option value="Prediabetes">Prediabetes</option>
                <option value="High Blood Pressure">High Blood Pressure</option>
                <option value="High cholesterol">High cholesterol</option>
                <option value="Insulin Resistance">Insulin Resistance</option>
                <option value="None">None</option>
            </select>
        </div>
        <div class="form-group">
            <label for="Have you or a close family member been diagnosed with an autoimmune disease?">Have you or a close family member been diagnosed with an autoimmune disease?</label>
            <select name="Have you or a close family member been diagnosed with an autoimmune disease?" id="Have you or a close family member been diagnosed with an autoimmune disease?" required>
                <option value="">Select an option</option>
                <option value="You">You</option>
                <option value="Father">Father</option>
                <option value="Mother">Mother</option>
                <option value="Sibling">Sibling</option>
                <option value="Grandparent">Grandparent</option>
                <option value="None">None</option>
                <option value="Unsure">Unsure</option>
            </select>
        </div>
        <div class="section-title">
            Symptoms
        </div>
        <div class="form-group">
            <label for="How often do you experience excessive thirst or frequent urination?">How often do you experience excessive thirst or frequent urination?</label>
            <select name="How often do you experience excessive thirst or frequent urination?" required>
                <option value="">Select an option</option>
                <option value="Never">Never</option>
                <option value="Rarely">Rarely</option>
                <option value="Sometimes">Sometimes</option>
                <option value="Often">Often</option>
                <option value="Always">Always</option>
            </select>
        </div>
        <div class="form-group">
            <label for="How often do you experience unusual fatigue or low energy?">How often do you experience unusual fatigue or low energy?</label>
            <select name="How often do you experience unusual fatigue or low energy?" required>
                <option value="">Select an option</option>
                <option value="Never">Never</option>
                <option value="Rarely">Rarely</option>
                <option value="Sometimes">Sometimes</option>
                <option value="Often">Often</option>
                <option value="Always">Always</option>
            </select>
        </div>
        <div class="form-group">
            <label for="Have you experienced unexplained weight loss, blurred vision, or slow-healing wounds?">Have you experienced unexplained weight loss, blurred vision, or slow-healing wounds?</label>
            <select name="Have you experienced unexplained weight loss, blurred vision, or slow-healing wounds?" required>
                <option value="">Select an option</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>
        <div class="section-title">
            Lifestyle and Habits
        </div>
        <div class="form-group">
            <label for="How many days per week do you exercise?">How many days per week do you exercise?</label>
            <select name="How many days per week do you exercise?" required>
                <option value="">Select an option</option>
                <option value="0">0 days</option>
                <option value="1">1 day</option>
                <option value="2">2 days</option>
                <option value="3">3 days</option>
                <option value="4">4 days</option>
                <option value="5">5 days</option>
                <option value="6">6 days</option>
                <option value="7">7 days</option>
            </select>
        </div>
        <div class="form-group">
            <label for="How would you describe your typical diet?">How would you describe your typical diet?</label>
            <select name="How would you describe your typical diet?" required>
                <option value="">Select an option</option>
                <option value="Mostly whole foods">Mostly whole foods</option>
                <option value="High in processed foods">High in processed foods</option>
                <option value="High in sugar">High in sugar</option>
                <option value="Balanced Mix">Balanced Mix</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="How many hours of sleep do you get on average per night?">How many hours of sleep do you get on average per night?</label>
            <select name="How many hours of sleep do you get on average per night?" required>
                <option value="">Select an option</option>
                <option value="Less than 5 hours">Less than 5 hours</option>
                <option value="5-6 hours">5-6 hours</option>
                <option value="7-8 hours">7-8 hours</option>
                <option value="More than 8 hours">More than 8 hours</option>
            </select>
        </div>
    </form>
    
</body>
</html>
